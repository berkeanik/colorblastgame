<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
    <title>Color Blast – Block Puzzle</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0d0d1a;
            --panel: #1a1a35;
            --border: #2a2a55;
            --text: #e0e0ff;
            --muted: #6666aa;
            --purple: #a78bfa;
            --btn: linear-gradient(135deg, #7c3aed, #2563eb)
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            touch-action: none
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 8px;
            gap: 8px;
            min-height: 100dvh;
            background: radial-gradient(ellipse at 30% 20%, #1a0a3a 0%, #0d0d1a 60%)
        }

        /* SCREENS */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 520px;
            flex: 1;
            gap: 20px
        }

        .screen.active {
            display: flex
        }

        /* MENU */
        .logo {
            text-align: center
        }

        .logo h1 {
            font-size: clamp(2.2rem, 9vw, 3.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            line-height: 1
        }

        .logo p {
            color: var(--muted);
            font-size: .88rem;
            margin-top: 4px
        }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 240px
        }

        .btn {
            background: var(--btn);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            padding: 15px 0;
            cursor: pointer;
            box-shadow: 0 4px 24px #7c3aed55;
            transition: transform .15s, box-shadow .15s;
            width: 100%;
            letter-spacing: .3px
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px #7c3aed88
        }

        .btn:active {
            transform: scale(.97)
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--purple);
            box-shadow: none
        }

        .btn-outline:hover {
            border-color: var(--purple);
            background: #ffffff08
        }

        .btn-sm {
            font-size: .95rem;
            padding: 12px 0
        }

        /* SETTINGS SCREEN */
        #settingsScreen h2 {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .settings-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 22px
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .setting-label {
            display: flex;
            justify-content: space-between;
            font-size: .92rem
        }

        .setting-label span:last-child {
            color: var(--purple);
            font-weight: 700;
            min-width: 36px;
            text-align: right
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            outline: none;
            cursor: pointer
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--purple);
            box-shadow: 0 0 8px #a78bfa88;
            cursor: pointer
        }

        /* GAME HEADER – 3 columns */
        #gameHeaderWrap {
            display: none;
            width: 100%;
            max-width: 520px
        }

        #gameHeader {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 6px;
            padding: 2px 0
        }

        .hdr-stat {
            display: flex;
            flex-direction: column;
            gap: 1px
        }

        .hdr-stat.right {
            align-items: flex-end
        }

        .hdr-label {
            font-size: .6rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .hdr-val {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 900;
            color: var(--purple);
            text-shadow: 0 0 16px #7c5cbfaa;
            transition: transform .15s
        }

        .hdr-val.pop {
            transform: scale(1.3);
            color: #f0abfc
        }

        #hdrTitle h1 {
            font-size: clamp(1rem, 3.5vw, 1.45rem);
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            white-space: nowrap;
            cursor: pointer
        }

        #hdrTitle h1:hover {
            opacity: .8
        }

        /* GAME WRAP */
        #gameWrap {
            display: none;
            position: relative;
            width: 100%;
            max-width: 520px
        }

        canvas {
            border-radius: 16px;
            display: block;
            touch-action: none;
            cursor: grab
        }

        canvas:active {
            cursor: grabbing
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            border-radius: 16px
        }

        /* TRAY */
        #trayWrap {
            display: none;
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            gap: 6px;
            min-height: 98px
        }

        .tray-slot {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 78px
        }

        /* LEGEND */
        .legend {
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: .67rem;
            color: var(--muted);
            max-width: 520px
        }

        .legend.show {
            display: flex
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 3px
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 2px
        }

        /* COMBO BANNER — Block Blast style */
        #comboBanner {
            position: fixed;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0) translateY(40px);
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: none;
            white-space: nowrap;
        }

        #comboBanner.show {
            animation: comboIn 1.1s cubic-bezier(.22, 1, .36, 1) forwards;
        }

        #comboBanner.allclear {
            animation: allClearAnim 1.4s cubic-bezier(.22, 1, .36, 1) forwards;
        }

        @keyframes comboIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.4) translateY(30px);
            }

            18% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.18) translateY(-6px);
            }

            32% {
                transform: translate(-50%, -50%) scale(0.95) translateY(2px);
            }

            46% {
                transform: translate(-50%, -50%) scale(1.06) translateY(-2px);
            }

            60% {
                transform: translate(-50%, -50%) scale(1) translateY(0);
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.85) translateY(-20px);
            }
        }

        @keyframes allClearAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.35);
            }

            38% {
                transform: translate(-50%, -50%) scale(0.92);
            }

            52% {
                transform: translate(-50%, -50%) scale(1.08);
            }

            65% {
                transform: translate(-50%, -50%) scale(1);
            }

            78% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        #comboBanner .cb-streak {
            font-size: clamp(2.8rem, 11vw, 4.5rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px currentColor, 0 3px 0 rgba(0, 0, 0, .4);
            line-height: 1;
        }

        #comboBanner .cb-label {
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.08em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, .5);
        }

        #comboBanner.combo1 .cb-streak {
            color: #facc15;
        }

        #comboBanner.combo2 .cb-streak {
            color: #fb923c;
        }

        #comboBanner.combo3 .cb-streak {
            color: #f472b6;
        }

        #comboBanner.combo4 .cb-streak {
            color: #a78bfa;
        }

        #comboBanner.combo5p .cb-streak {
            color: #34d399;
            text-shadow: 0 0 40px #34d399;
        }

        #comboBanner.allclear .cb-streak {
            color: #fde68a;
            text-shadow: 0 0 50px #fbbf24, 0 0 80px #f59e0b;
        }

        #comboBanner.allclear .cb-label {
            color: #fde68a;
        }

        /* Flash overlay for ALL CLEAR */
        #allClearFlash {
            position: fixed;
            inset: 0;
            background: #ffffffcc;
            pointer-events: none;
            opacity: 0;
            z-index: 140;
        }

        #allClearFlash.flash {
            animation: flashFade .6s ease-out forwards;
        }

        @keyframes flashFade {
            0% {
                opacity: .9;
            }

            100% {
                opacity: 0;
            }
        }

        /* OVERLAYS */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: #000b;
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center
        }

        .modal-bg.open {
            display: flex
        }

        .modal-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 28px 32px;
            width: min(96vw, 320px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: cardIn .35s cubic-bezier(.34, 1.56, .64, 1)
        }

        @keyframes cardIn {
            from {
                transform: scale(.6);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .modal-card h2 {
            font-size: 1.9rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f472b6, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .modal-card h3 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--purple)
        }

        .final-score {
            font-size: .95rem;
            color: var(--muted);
            text-align: center
        }

        .final-score span {
            color: var(--purple);
            font-size: 1.9rem;
            font-weight: 900;
            display: block
        }

        .modal-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%
        }

        /* settings inside modal */
        .modal-settings {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-top: 1px solid var(--border);
            padding-top: 16px
        }

        @media(max-height:700px) {
            body {
                padding: 4px;
                gap: 4px
            }

            #trayWrap {
                min-height: 72px;
                padding: 6px
            }

            .legend {
                display: none !important
            }
        }
    </style>
</head>

<body>
    <!-- Local Background Music -->
    <audio id="bgMusic" src="music.mp3" loop></audio>


    <!-- ══ MENU ══ -->
    <div id="menuScreen" class="screen active">
        <div class="logo">
            <h1>🎨 Color Blast</h1>
            <p>Block Puzzle · Color Matching</p>
        </div>
        <div class="menu-btns">
            <button class="btn" id="btnPlay">▶ Play</button>
            <button class="btn btn-outline" id="btnGoSettings">⚙ Settings</button>
        </div>
    </div>

    <!-- ══ SETTINGS SCREEN ══ -->
    <div id="settingsScreen" class="screen">
        <h2>⚙ Settings</h2>
        <div class="settings-card">
            <div class="setting-row">
                <div class="setting-label"><span>🔊 Sound Effects</span><span id="sfxVal">100%</span></div>
                <input type="range" id="sfxSlider" min="0" max="100" value="100" />
            </div>
            <div class="setting-row">
                <div class="setting-label"><span>🎵 Background Music</span><span id="musicVal">60%</span></div>
                <input type="range" id="musicSlider" min="0" max="100" value="60" />
            </div>
        </div>
        <button class="btn btn-outline btn-sm" id="btnBackMenu" style="width:200px">← Back</button>
    </div>

    <!-- ══ GAME HEADER ══ -->
    <div id="gameHeaderWrap">
        <div id="gameHeader">
            <div class="hdr-stat">
                <span class="hdr-label">Best</span>
                <span class="hdr-val" id="highScoreDisplay">0</span>
            </div>
            <div id="hdrTitle">
                <h1 id="btnPauseTitle">⏸ Color Blast</h1>
            </div>
            <div class="hdr-stat right">
                <span class="hdr-label">Score</span>
                <span class="hdr-val" id="scoreDisplay">0</span>
            </div>
        </div>
    </div>

    <div id="gameWrap">
        <canvas id="gridCanvas"></canvas>
        <canvas id="particleCanvas"></canvas>
    </div>

    <div id="trayWrap">
        <div class="tray-slot" id="slot0"></div>
        <div class="tray-slot" id="slot1"></div>
        <div class="tray-slot" id="slot2"></div>
    </div>

    <div class="legend" id="legend">
        <span class="legend-item"><span class="legend-dot"
                style="background:#ff4466;box-shadow:0 0 5px #ff4466"></span>Red</span>
        <span class="legend-item"><span class="legend-dot"
                style="background:#4488ff;box-shadow:0 0 5px #4488ff"></span>Blue</span>
        <span class="legend-item"><span class="legend-dot"
                style="background:#44ff88;box-shadow:0 0 5px #44ff88"></span>Green</span>
        <span class="legend-item"><span class="legend-dot"
                style="background:#ffdd22;box-shadow:0 0 5px #ffdd22"></span>Yellow</span>
        <span class="legend-item"><span class="legend-dot"
                style="background:#cc44ff;box-shadow:0 0 5px #cc44ff"></span>Purple</span>
        <span class="legend-item">Line +100</span>
        <span class="legend-item">Cluster +150</span>
    </div>

    <div id="comboBanner">
        <div class="cb-streak" id="cbStreak"></div>
        <div class="cb-label" id="cbLabel"></div>
    </div>
    <div id="allClearFlash"></div>

    <!-- ══ PAUSE OVERLAY ══ -->
    <div class="modal-bg" id="pauseOverlay">
        <div class="modal-card">
            <h3>⏸ Paused</h3>
            <div class="modal-btns">
                <button class="btn" id="btnResume">▶ Resume</button>
                <button class="btn btn-outline btn-sm" id="btnPauseToMenu">🏠 Main Menu</button>
            </div>
            <!-- inline settings -->
            <div class="modal-settings">
                <div class="setting-row">
                    <div class="setting-label"><span>🔊 SFX</span><span id="sfxVal2">100%</span></div>
                    <input type="range" id="sfxSlider2" min="0" max="100" value="100" />
                </div>
                <div class="setting-row">
                    <div class="setting-label"><span>🎵 Music</span><span id="musicVal2">60%</span></div>
                    <input type="range" id="musicSlider2" min="0" max="100" value="60" />
                </div>
            </div>
        </div>
    </div>

    <!-- ══ GAME OVER OVERLAY ══ -->
    <div class="modal-bg" id="overlay">
        <div class="modal-card">
            <h2>Game Over</h2>
            <div class="final-score">Final Score<span id="finalScore">0</span></div>
            <div class="modal-btns">
                <button class="btn" id="btnRestart">▶ Play Again</button>
                <button class="btn btn-outline btn-sm" id="btnToMenu">🏠 Main Menu</button>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ── AUDIO ENGINE ─────────────────────────────────────────────────
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        let sfxVolume = 1.0, musicVolume = 0.6;
        let musicGain = null, musicStarted = false, musicScheduler = null;
        let musicOscs = [], chordIdx = 0;

        function playPop(count = 1) {
            if (sfxVolume === 0) return;
            const ac = getAudioCtx(), n = Math.min(count, 6);
            const spread = Math.min(n * 0.04, 0.22);
            for (let i = 0; i < n; i++) {
                const t = ac.currentTime + i * (spread / Math.max(n, 1));
                const osc = ac.createOscillator(), g = ac.createGain();
                const freq = 500 + Math.random() * 300;
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * .7, t);
                osc.frequency.exponentialRampToValueAtTime(freq * 1.7, t + .07);
                osc.frequency.exponentialRampToValueAtTime(freq * .85, t + .16);
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(sfxVolume * .32, t + .025);
                g.gain.exponentialRampToValueAtTime(.001, t + .19);
                osc.connect(g); g.connect(ac.destination);
                osc.start(t); osc.stop(t + .2);
            }
        }

        function playPlace() {
            if (sfxVolume === 0) return;
            const ac = getAudioCtx(), t = ac.currentTime;
            const osc = ac.createOscillator(), g = ac.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(190, t);
            osc.frequency.exponentialRampToValueAtTime(270, t + .05);
            g.gain.setValueAtTime(sfxVolume * .18, t);
            g.gain.exponentialRampToValueAtTime(.001, t + .1);
            osc.connect(g); g.connect(ac.destination);
            osc.start(t); osc.stop(t + .11);
        }

        // ── LO-FI SEQUENCER ──────────────────────────────────────────────
        // BPM=80. Beat=0.75s. Bar=3s (4 beats). Pattern=8 bars.
        // Chord prog (I–V–vi–IV in C): Cmaj7, G7, Am7, Fmaj7
        const SEQ_BPM = 80;
        const BEAT = 60 / SEQ_BPM;          // 0.75 s
        const BAR = BEAT * 4;              // 3 s

        // [root, third, fifth, seventh] in Hz — one octave lower for bass
        const CHORD_NOTES = [
            [130.81, 164.81, 196.00, 246.94],  // C3maj7  (I)
            [146.83, 184.99, 220.00, 261.63],  // D3m7   (ii)
            [164.81, 196.00, 246.94, 293.66],  // E3m7   (iii)
            [174.61, 220.00, 261.63, 329.63],  // F3maj7 (IV)
            [196.00, 246.94, 293.66, 369.99],  // G3dom7 (V)
            [110.00, 138.59, 164.81, 207.65],  // A2m7   (vi)
        ];
        // 8-bar progression indices into CHORD_NOTES
        const PROGRESSION = [0, 0, 3, 3, 4, 4, 5, 3];
        // Melody arpeggio pattern (semitone offsets from chord root, in 8th notes per bar)
        const MELODY_PAT = [0, 7, 12, 7, 4, 7, 12, 4]; // 8 eighth notes per bar

        let seqBar = 0, seqTimeoutIds = [];

        function makeOsc(ac, type, freq, gainNode, startT, stopT, vol, attack, release) {
            const osc = ac.createOscillator(), g = ac.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0, startT);
            g.gain.linearRampToValueAtTime(vol, startT + attack);
            g.gain.setValueAtTime(vol, stopT - release);
            g.gain.linearRampToValueAtTime(0, stopT);
            osc.connect(g); g.connect(gainNode);
            osc.start(startT); osc.stop(stopT + 0.02);
            musicOscs.push(osc);
        }

        function noteFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

        function scheduleBar(startTime) {
            if (!musicStarted) return;
            const ac = getAudioCtx();
            const chordNotes = CHORD_NOTES[PROGRESSION[seqBar % PROGRESSION.length]];

            // Pad — whole bar, all chord tones softly
            chordNotes.forEach((freq, i) => {
                makeOsc(ac, 'sine', freq * 2, musicGain, startTime, startTime + BAR * 0.95, 0.18 - i * 0.03, 0.4, 0.3);
                makeOsc(ac, 'triangle', freq * 2 * 1.004, musicGain, startTime, startTime + BAR * 0.95, 0.05, 0.5, 0.3);
            });

            // Bass — root on beat 1, fifth on beat 3
            const bass = chordNotes[0];
            makeOsc(ac, 'sine', bass, musicGain, startTime, startTime + BEAT * 0.85, 0.38, 0.02, 0.1);
            makeOsc(ac, 'sine', bass * 1.5, musicGain, startTime + BEAT * 2, startTime + BEAT * 2.85, 0.28, 0.02, 0.1);

            // Melody arpeggio — eighth notes
            const rootMidi = Math.round(12 * Math.log2(bass / 32.70) + 24); // bass root → midi
            MELODY_PAT.forEach((semis, i) => {
                const t = startTime + i * (BEAT / 2);
                const freq = noteFreq(rootMidi + 24 + semis); // two octaves up
                makeOsc(ac, 'sine', freq, musicGain, t, t + BEAT * 0.38, 0.11, 0.01, 0.08);
            });

            seqBar++;

            context.shadowBlur = 0;

        function renderGrid() {

            const now = performance.now();

            for (let c = 0; c < COLS; c++) if (grid.every(row => row[c] !== EMPTY)) cols.push(c);

        function findColorClusters(placedSet) {
            const visited = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
            const clusters = [];
            for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
                if (visited[r][c] || grid[r][c] === EMPTY) continue;
                const colorIdx = grid[r][c];
                const queue = [[r, c]], group = [];
                visited[r][c] = true;
                while (queue.length) {
                    const [cr, cc] = queue.shift(); group.push([cr, cc]);
                    for (const [nr, nc] of [[cr - 1, cc], [cr + 1, cc], [cr, cc - 1], [cr, cc + 1]]) {

        // ── PROCESS CLEARS  (only full rows & columns) ───────────────────
        function processClearances(justPlaced) {
            let linesCleared = 0;

            const { rows: fullRows, cols: fullCols } = findFullLines();
            for (const r of fullRows) {
                for (let c = 0; c < COLS; c++) {
                    const key = `${r},${c}`;
                    if (!clearedCells.has(key)) {

                        if (ci !== EMPTY) spawnParticles([[r, c]], clr);

                    pts += 2000;
                    playPop(12);
                } else {
                    playPop(Math.min(clearedCells.size, 8));
                }

                showClearBanner(linesCleared, isAllClear);
            } else {
                // No clear this turn — reset streak
                comboStreak = 0;
                if (clearedCells.size > 0) playPop(Math.min(clearedCells.size, 4));
            }

            addScore(pts);
        }

        // ── SPAWN ─────────────────────────────────────────────────────────
        function findHelpfulShape() {
            const hints = [];
            for (let r = 0; r < ROWS; r++) {
                const filled = grid[r].filter(v => v !== EMPTY).length;
                if (filled < 5 || filled >= COLS) continue;
                let seg = [];
                for (let c = 0; c <= COLS; c++) {
                    if (c < COLS && grid[r][c] === EMPTY) { seg.push(c); }
                    else if (seg.length) { if (seg.length <= 5) hints.push(seg.map((_, i) => [0, i])); seg = []; }
                }
            }
            for (let c = 0; c < COLS; c++) {
                const filled = grid.filter(row => row[c] !== EMPTY).length;
                if (filled < 5 || filled >= ROWS) continue;
                let seg = [];
                for (let r = 0; r <= ROWS; r++) {
                    if (r < ROWS && grid[r][c] === EMPTY) { seg.push(r); }
                    else if (seg.length) { if (seg.length <= 5) hints.push(seg.map((_, i) => [i, 0])); seg = []; }
                }
            }
            return hints.length ? hints[Math.floor(Math.random() * hints.length)] : null;
        }
        // Weighted random shape selection (very rare 1x1, 1x2, 2x1)
        function randomPiece() {
            // Assign weight 1 to small pieces, weight 50 to larger pieces
            const weights = SHAPES.map(s => (s.length <= 2) ? 1 : 50);
            const totalWeight = weights.reduce((sum, w) => sum + w, 0);
            let rd = Math.random() * totalWeight;
            let si = 0;
            for (let i = 0; i < weights.length; i++) {
                rd -= weights[i];
                if (rd <= 0) { si = i; break; }
            }
            const ci = Math.floor(Math.random() * COLORS.length);
            return { shape: SHAPES[si], color: COLORS[ci], colorIdx: ci };
        }
        function spawnTray() {
            trayPieces = [0, 1, 2].map(i => {
                // Agresif smart spawn sistemi (çok daha sık yardımcı parça verir)
                const chance = i === 0 ? 0.80 : (i === 1 ? 0.40 : 0.20);
                if (Math.random() < chance) {
                    const hs = findHelpfulShape();
                    if (hs) {
                        const ci = Math.floor(Math.random() * COLORS.length);
                        return { shape: hs, color: COLORS[ci], colorIdx: ci };
                    }
                }
                return randomPiece();
            });
        }
        function checkAllUsed() { if (trayPieces.every(p => p === null)) spawnTray(); }

        function hasValidPlacement() {
            for (const piece of trayPieces) {
                if (!piece) continue;
                for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (canPlace(piece, r, c)) return true;
            }
            return false;
        }

        function triggerGameOver() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            const ov = document.getElementById('overlay');
            ov.style.display = 'flex'; ov.classList.add('open');
        }

        // ── INIT ──────────────────────────────────────────────────────────
        function initGame() {
            score = 0; gameOver = false; paused = false;
            particles = []; flashCells.clear();
            scoreDisplay.textContent = '0';
            updateHighScore(0);
            initGrid(); spawnTray();
            resizeCanvases(); renderAll();
        }

        // ── DRAG & DROP ───────────────────────────────────────────────────
        function onPointerDown(e, slotIdx) {
            if (gameOver || paused) return;
            const piece = trayPieces[slotIdx];
            if (!piece) return;
            e.preventDefault();
            getAudioCtx().resume();
            const { x, y } = getEvtPos(e);
            drag = { active: true, slotIdx, piece, x, y, gridRow: -1, gridCol: -1, valid: false };
            ghostCanvas = createGhostCanvas(piece);
            positionGhost(x, y); renderTray();
        }
        function onPointerMove(e) {
            if (!drag.active) return;
            e.preventDefault();
            const { x, y } = getEvtPos(e);
            drag.x = x; drag.y = y;
            positionGhost(x, y);
            const { gridRow, gridCol } = getBestPos(x, y, drag.piece);
            drag.gridRow = gridRow; drag.gridCol = gridCol;
            drag.valid = canPlace(drag.piece, gridRow, gridCol);
            renderGrid();
        }
        function onPointerUp(e) {
            if (!drag.active) return;
            e.preventDefault();
            removeGhost();
            if (drag.valid && drag.gridRow !== -1) {
                const placed = [];
                for (const [dr, dc] of drag.piece.shape) placed.push([drag.gridRow + dr, drag.gridCol + dc]);
                placePiece(drag.piece, drag.gridRow, drag.gridCol);
                trayPieces[drag.slotIdx] = null;
                playPlace();
                processClearances(placed);
                checkAllUsed();
                if (!hasValidPlacement()) setTimeout(triggerGameOver, 500);
            }
            drag.active = false; drag.piece = null; drag.gridRow = -1; drag.valid = false;
            renderAll();
        }

        trayCanvases.forEach((c, i) => c.addEventListener('pointerdown', e => onPointerDown(e, i)));
        window.addEventListener('pointermove', onPointerMove, { passive: false });
        window.addEventListener('pointerup', onPointerUp, { passive: false });
        window.addEventListener('pointercancel', onPointerUp, { passive: false });

        // ── LOOP  (native device FPS — no artificial throttle) ────────────
        (function loop() {
            renderGrid();
            if (particles.length) updateParticles();
            else pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            requestAnimationFrame(loop);
        })();

        // Init display
        updateHighScore(highScore);
    </script>
</body>
